services:
  server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=https://mtyeznctoptxvnnkbvpl.supabase.co
      - SUPABASE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10eWV6bmN0b3B0eHZubmtidnBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzE0NjMyNjEsImV4cCI6MjA0NzAzOTI2MX0.x-c5DXPiAvogTDPnFk3JGYQe7JQ3otHZn3mQdGe98pU
      - PYTHONPATH=/app
    depends_on:
      - redis
      - worker
    networks:
      - kimenko

  worker:
    build: .
    container_name: disagg-worker
    command: celery -A worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
      - scalers_data:/app/scalers   # volumen persistente para los scalers
    depends_on:
      - redis
    environment:
      - SUPABASE_URL=https://mtyeznctoptxvnnkbvpl.supabase.co
      - SUPABASE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10eWV6bmN0b3B0eHZubmtidnBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzE0NjMyNjEsImV4cCI6MjA0NzAzOTI2MX0.x-c5DXPiAvogTDPnFk3JGYQe7JQ3otHZn3mQdGe98pU
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - SCALER_DIR=/app/scalers     # ruta dentro del contenedor
    networks:
      - kimenko

  beat:
    build: .
    command: celery -A worker.celery_app beat --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
      - worker
    environment:
      - SUPABASE_URL=https://mtyeznctoptxvnnkbvpl.supabase.co
      - SUPABASE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10eWV6bmN0b3B0eHZubmtidnBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzE0NjMyNjEsImV4cCI6MjA0NzAzOTI2MX0.x-c5DXPiAvogTDPnFk3JGYQe7JQ3otHZn3mQdGe98pU
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    networks:
      - kimenko

  redis:
    image: redis:7-alpine
    container_name: kimenko-redis
    volumes:
      - redis_data:/data
    networks:
      - kimenko

volumes:
  redis_data:
  scalers_data:    # volumen Docker gestionado — persiste entre reinicios del contenedor

networks:
  kimenko:
    external: true
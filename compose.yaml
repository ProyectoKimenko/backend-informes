# Orquestación de API + worker + beat + redis.
# Producción (Dokploy): define las variables de entorno (SUPABASE_URL, SUPABASE_KEY,
# REDIS_URL, ALLOWED_ORIGINS) en el panel de Dokploy o en un archivo .env junto a este
# compose. NO se commitean secretos: se interpolan con ${...}.
# Local: copia .env.example a .env y `docker compose up --build`.

x-app-env: &app-env
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_KEY: ${SUPABASE_KEY}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  PYTHONPATH: /app
  PYTHONUNBUFFERED: "1"

services:
  server:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *app-env
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      - redis
      - worker
    networks:
      - kimenko

  worker:
    build: .
    container_name: disagg-worker
    restart: unless-stopped
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      <<: *app-env
    depends_on:
      - redis
    networks:
      - kimenko

  beat:
    build: .
    restart: unless-stopped
    command: celery -A worker.celery_app beat --loglevel=info
    environment:
      <<: *app-env
    depends_on:
      - redis
      - worker
    networks:
      - kimenko

  redis:
    image: redis:7-alpine
    container_name: kimenko-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - kimenko

volumes:
  redis_data:

# Red gestionada por compose (antes era external:true y fallaba si no existía).
# En Dokploy el dominio público se enruta aparte vía su red de Traefik.
networks:
  kimenko:
    driver: bridge

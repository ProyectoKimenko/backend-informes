# Orquestación: API (server) + redis.
# La desagregación corre DENTRO del server (FastAPI BackgroundTasks + scheduler
# horario interno) — ya no hay worker/beat de Celery. Redis se mantiene solo para
# el estado de scrapers legacy (servicios /monitors, /scrapers/status).
# Producción (Dokploy): definir SUPABASE_URL, SUPABASE_KEY, REDIS_URL, ALLOWED_ORIGINS
# en el panel o un .env junto a este compose. Secretos vía ${...}, no commiteados.

x-app-env: &app-env
  SUPABASE_URL: ${SUPABASE_URL}
  # service_role para el backend (bypassa RLS); SUPABASE_KEY (anon) como fallback.
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
  SUPABASE_KEY: ${SUPABASE_KEY}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  PYTHONPATH: /app
  PYTHONUNBUFFERED: "1"

services:
  server:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *app-env
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      - redis
    networks:
      - kimenko

  redis:
    image: redis:7-alpine
    container_name: kimenko-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - kimenko

volumes:
  redis_data:

networks:
  kimenko:
    driver: bridge
